server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache HTML, JS, CSS — always check for fresh version
    location ~* \.(html|js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Proxy API calls so the frontend doesn't need to know the API hostname
    location /api/ {
        proxy_pass http://cert-tracker-api:3000/api/;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
