services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: certtracker
      POSTGRES_USER: certtracker
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U certtracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://certtracker:devpassword@postgres:5432/certtracker
      BASIC_AUTH_USER: admin
      BASIC_AUTH_PASSWORD: devpassword
      PORT: 3000
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api

  scraper:
    build: ./scraper
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://certtracker:devpassword@postgres:5432/certtracker
      RUN_ONCE: "true"
    profiles:
      - scraper  # only starts with: docker compose --profile scraper up scraper

volumes:
  pgdata:
